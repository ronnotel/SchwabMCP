# Hard-fail secret scan on every push (and PR if any).
# Config: .gitleaks.toml (no live-secret allowlist).
name: Secret Scan

on:
  push:
  pull_request:
  workflow_dispatch:

# Repo default GITHUB_TOKEN is read-only. gitleaks-action@v2 on pull_request
# calls GET /pulls/{n}/commits, which requires pull-requests: read.
permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_ENABLE_COMMENTS: "false"
